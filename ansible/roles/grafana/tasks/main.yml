---
# tasks file for roles/grafana

- name: Install required packages
  apt:
    name:
      - wget
      - gdebi-core
    update_cache: yes
    state: present

- name: Download Grafana OSS 11.6.1
  get_url:
    url: https://dl.grafana.com/oss/release/grafana_11.6.1_amd64.deb
    dest: /tmp/grafana_11.6.1_amd64.deb
    mode: "0644"
    force: no

- name: Install Grafana
  apt:
    deb: /tmp/grafana_11.6.1_amd64.deb

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Create datasource directory
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Deploy datasource
  copy:
    src: provisioning/datasources/datasource.yml
    dest: /etc/grafana/provisioning/datasources/datasource.yml
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Create dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Copy dashboard provider
  template:
    src: dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/default.yml
    owner: root
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Copy Infrastructure Dashboard
  copy:
    src: infrastructure-monitoring-dashboard.json
    dest: /var/lib/grafana/dashboards/infrastructure-monitoring-dashboard.json
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Enable Grafana
  systemd:
    name: grafana-server
    enabled: yes

- name: Start Grafana
  systemd:
    name: grafana-server
    state: started
